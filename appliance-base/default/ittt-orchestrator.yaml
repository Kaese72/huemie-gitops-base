  template:
    metadata:
      labels:
        app: ittt-orchestrator-rule-state
        huemie-owner: core
        huemie.space/service-role: ittt-orchestrator
    spec:
      containers:
        - name: ittt-orchestrator-rule-state
          image: ghcr.io/kaese72/ittt-orchestrator:v0.0.1
          args: ["rule-state"]
          env:
            - name: "DATABASE_HOST"
              valueFrom:
                configMapKeyRef:
                  name: ittt-orchestrator-configmap
                  key: database.host
            - name: "DATABASE_USER"
              valueFrom:
                configMapKeyRef:
                  name: ittt-orchestrator-configmap
                  key: database.user
            - name: "DATABASE_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: ittt-orchestrator-secret
                  key: database.password
            - name: "EVENT_CONNECTIONSTRING"
              valueFrom:
                secretKeyRef:
                  name: ittt-orchestrator-secret
                  key: event.connectionstring
          resources:
