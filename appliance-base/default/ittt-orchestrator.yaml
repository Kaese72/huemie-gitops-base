              memory: 128M
            requests:
              cpu: 100m
              memory: 128M
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ittt-orchestrator-migrater
  labels:
    app: ittt-orchestrator-migrater
  annotations:
    argocd.argoproj.io/sync-wave: "40"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: ittt-orchestrator-migrater
        huemie.space/service-role: ittt-orchestrator
    spec:
      containers:
        - name: ittt-orchestrator-migrater
          image: ghcr.io/kaese72/ittt-orchestrator-migrater:v0.0.1
          imagePullPolicy: IfNotPresent
          args: ["-url=jdbc:mariadb://$(DATABASE_HOST):3306/itttorchestrator?user=$(DATABASE_USER)&password=$(DATABASE_PASSWORD)", "migrate"]
          env:
            - name: "DATABASE_HOST"
              valueFrom:
                configMapKeyRef:
                  name: ittt-orchestrator-configmap
                  key: database.host
            - name: "DATABASE_USER"
              valueFrom:
                configMapKeyRef:
                  name: ittt-orchestrator-configmap
                  key: database.user
            - name: "DATABASE_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: ittt-orchestrator-secret
                  key: database.password
          resources:
            limits:
              cpu: 250m
              memory: 128M
            requests:
              cpu: 100m
              memory: 128M
      restartPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: ittt-orchestrator
  annotations:
    argocd.argoproj.io/sync-wave: "60"
  name: ittt-orchestrator
spec:
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: ittt-orchestrator
status:
  loadBalancer: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ittt-orchestrator
  annotations:
    argocd.argoproj.io/sync-wave: "55"
spec:
  podSelector:
    matchLabels:
      huemie.space/service-role: ittt-orchestrator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              huemie.space/service-role: device-store
      ports:
        - port: 8081
    - to:
        - podSelector:
            matchLabels:
              huemie.space/service-role: mariadb
      ports:
        - port: 3306
    - to:
        - podSelector:
            matchLabels:
              huemie.space/service-role: rabbitmq
      ports:
        - port: 5672
