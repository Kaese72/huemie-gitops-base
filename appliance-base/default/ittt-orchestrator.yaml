apiVersion: apps/v1
kind: Deployment
metadata:
  name: ittt-orchestrator
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ittt-orchestrator
  template:
    metadata:
      labels:
        app: ittt-orchestrator
        huemie-owner: core
        huemie.space/service-role: ittt-orchestrator
    spec:
      containers:
        - name: ittt-orchestrator
          image: ghcr.io/kaese72/ittt-orchestrator:v0.0.1
          args: ["api"]
          env:
            - name: "DATABASE_HOST"
              valueFrom:
                configMapKeyRef:
                  name: ittt-orchestrator-configmap
                  key: database.host
            - name: "DATABASE_USER"
              valueFrom:
                configMapKeyRef:
                  name: ittt-orchestrator-configmap
                  key: database.user
            - name: "DATABASE_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: ittt-orchestrator-secret
                  key: database.password
            - name: "EVENT_CONNECTIONSTRING"
              valueFrom:
                secretKeyRef:
                  name: ittt-orchestrator-secret
                  key: event.connectionstring
            - name: AUTH_RSA_PUBLIC_KEY_PATH
              value: /etc/auth-pubkey/public.pem
          volumeMounts:
            - name: auth-pubkey
              mountPath: /etc/auth-pubkey
              readOnly: true
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: 500m
              memory: 128M
            requests:
              cpu: 100m
              memory: 128M
      volumes:
        - name: auth-pubkey
          secret:
            secretName: auth-rsa-public-key
            items:
              - key: public.pem
                path: public.pem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ittt-orchestrator-rule-state
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  replicas: 1
  selector:
    matchLabels:
