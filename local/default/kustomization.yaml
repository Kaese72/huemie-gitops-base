apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: huemie-local

configMapGenerator:
- name: cloud-connect-configmap
  literals:
    - server.url=https://apartment.humi.kaese.space/cloud-connect/v0/tunnel
    - allowed.host.pattern=app\.huemie\.local
    - local.ingress=traefik.kube-system.svc.cluster.local:80
- name: adapter-attendant-configmap
  literals:
    - adapter.namespace=adapters
    - adapters.device-store-url=http://device-store.huemie-local:8080
    - database.host=mariadb
    - database.user=user
- name: authentication-configmap
  literals:
    - database.host=mariadb
    - database.user=user
- name: device-store-configmap
  literals:
    - database.host=mariadb
    - database.user=user
- name: ittt-orchestrator-configmap
  literals:
    - database.host=mariadb
    - database.user=user

secretGenerator:
- name: adapter-attendant-secret
  literals:
    - database.password=databaseuserpassword
    - adapters.device-store-jwt-secret=supersecretjwtsecret
- name: authentication-secret
  literals:
    - database.password=databaseuserpassword
    - auth.refresh-secret=supersecretrefreshsecret
- name: authentication-rsa-secret
  files:
    - private.pem=authentication-private-key.pem
- name: auth-rsa-public-key
  files:
    - public.pem=authentication-public-key.pem
- name: device-store-secret
  literals:
    - database.password=databaseuserpassword
    - database.event.connectionstring=amqp://guest:guest@rabbitmq-headless:5672/
    - device-ingest.jwt-secret=supersecretjwtsecret
- name: ittt-orchestrator-secret
  literals:
    - database.password=databaseuserpassword
    - event.connectionstring=amqp://guest:guest@rabbitmq-headless:5672/

resources:
 - namespace.yaml
 - ../../appliance-base/default
 - ../3pp
