apiVersion: v1
kind: ServiceAccount
metadata:
  name: device-ingest-jwt-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: device-ingest-jwt-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["device-ingest-jwt-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: device-ingest-jwt-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
subjects:
  - kind: ServiceAccount
    name: device-ingest-jwt-bootstrap
roleRef:
  kind: Role
  name: device-ingest-jwt-bootstrap
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: device-ingest-jwt-bootstrap
  labels:
    app: device-ingest-jwt-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: device-ingest-jwt-bootstrap
        huemie.space/service-role: device-ingest-jwt-bootstrap
    spec:
      serviceAccountName: device-ingest-jwt-bootstrap
      containers:
        - name: create-secret
          image: alpine/k8s:1.30.2
          imagePullPolicy: IfNotPresent
          # Idempotent: if the device-ingest JWT secret already exists, does nothing.
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              NEW_SECRET=device-ingest-jwt-secret
              NEW_KEY=secret

              if kubectl get secret "$NEW_SECRET" -n "$NAMESPACE" >/dev/null 2>&1; then
                echo "device-ingest JWT secret already provisioned, skipping"
                exit 0
              fi

              SECRET_VALUE=$(head -c 32 /dev/urandom | base64 | tr -d '\n')
              kubectl create secret generic "$NEW_SECRET" -n "$NAMESPACE" --from-literal="$NEW_KEY=$SECRET_VALUE"
          resources:
            limits:
              cpu: 100m
              memory: 32M
            requests:
              cpu: 20m
              memory: 16M
      restartPolicy: Never
