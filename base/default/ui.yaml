apiVersion: apps/v1
kind: Deployment
metadata:
  name: huemie-ui
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: huemie-ui
  template:
    metadata:
      labels:
        app: huemie-ui
        huemie-owner: core
        huemie.space/service-role: huemie-ui
    spec:
      containers:
        - name: huemie-ui
          image: ghcr.io/kaese72/huemie-ui:v0.0.4
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 50m
              memory: 256M
            requests:
              cpu: 10m
              memory: 256M
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: huemie-ui
  annotations:
    argocd.argoproj.io/sync-wave: "60"
  name: huemie-ui
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
  selector:
    app: huemie-ui
status:
  loadBalancer: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: huemie-ui
  annotations:
    argocd.argoproj.io/sync-wave: "55"
spec:
  podSelector:
    matchLabels:
      huemie.space/service-role: huemie-ui
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 80
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
