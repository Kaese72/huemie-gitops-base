apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-store
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: device-store
  template:
    metadata:
      labels:
        app: device-store
        huemie-owner: core
        huemie.space/service-role: device-store
    spec:
      containers:
        - name: device-store
          image: ghcr.io/kaese72/device-store:v0.0.57
          env:
            - name: "DATABASE_HOST"
              valueFrom:
                configMapKeyRef:
                  name: device-store-configmap
                  key: database.host
            - name: "DATABASE_USER"
              valueFrom:
                configMapKeyRef:
                  name: device-store-configmap
                  key: database.user
            - name: "DATABASE_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: device-store-secret
                  key: database.password
            - name: "EVENT_CONNECTIONSTRING"
              valueFrom:
                secretKeyRef:
                  name: device-store-secret
                  key: database.event.connectionstring
            - name: "DEVICE_INGEST_JWT_SECRET"
              valueFrom:
                secretKeyRef:
                  name: device-ingest-jwt-secret
                  key: secret
            - name: "AUTH_RSA_PUBLIC_KEY_PATH"
              value: /etc/auth-pubkey/public.pem
          volumeMounts:
            - name: auth-pubkey
              mountPath: /etc/auth-pubkey
              readOnly: true
          ports:
            - containerPort: 8080
            - containerPort: 8081
          resources:
            limits:
              cpu: 1000m
              memory: 256M
            requests:
              cpu: 500m
              memory: 256M
      volumes:
        - name: auth-pubkey
          secret:
            secretName: auth-rsa-verify-key
            items:
              - key: public.pem
                path: public.pem
---
apiVersion: batch/v1
kind: Job
metadata:
  name: device-store-migrater
  labels:
    app: device-store-migrater
  annotations:
    argocd.argoproj.io/sync-wave: "40"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: device-store-migrater
        huemie.space/service-role: device-store
    spec:
      containers:
      - name: device-store-migrater
        image: ghcr.io/kaese72/device-store-migrater:v0.0.57
        imagePullPolicy: IfNotPresent
        args: ["-url=jdbc:mariadb://$(DATABASE_HOST):3306/devicestore?user=$(DATABASE_USER)&password=$(DATABASE_PASSWORD)", "migrate"]
        env:
          - name: "DATABASE_HOST"
            valueFrom:
              configMapKeyRef:
                name: device-store-configmap
                key: database.host
          - name: "DATABASE_USER"
            valueFrom:
              configMapKeyRef:
                name: device-store-configmap
                key: database.user
          - name: "DATABASE_PASSWORD"
            valueFrom:
              secretKeyRef:
                name: device-store-secret
                key: database.password
        resources:
            limits:
              cpu: 250m
              memory: 128M
            requests:
              cpu: 100m
              memory: 128M
      restartPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: device-store
  annotations:
    argocd.argoproj.io/sync-wave: "60"
  name: device-store
spec:
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: device-store
status:
  loadBalancer: {}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: device-store
  annotations:
    argocd.argoproj.io/sync-wave: "60"
  name: device-store-internal
spec:
  ports:
    - port: 8081
      protocol: TCP
      targetPort: 8081
  selector:
    app: device-store
status:
  loadBalancer: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: device-store
  annotations:
    argocd.argoproj.io/sync-wave: "55"
spec:
  podSelector:
    matchLabels:
      huemie.space/service-role: device-store
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              huemie.space/namespace-role: adapters
          podSelector:
            matchLabels:
              huemie.space/service-role: adapter
      ports:
        - port: 8080
    - from:
        - podSelector:
            matchLabels:
              huemie.space/service-role: ittt-orchestrator
      ports:
        - port: 8081
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              huemie.space/service-role: adapter-attendant
      ports:
        - port: 8081
    - to:
        - namespaceSelector:
            matchLabels:
              huemie.space/namespace-role: adapters
          podSelector:
            matchLabels:
              huemie.space/service-role: adapter
      ports:
        - port: 8080
    - to:
        - podSelector:
            matchLabels:
              huemie.space/service-role: mariadb
      ports:
        - port: 3306
    - to:
        - podSelector:
            matchLabels:
              huemie.space/service-role: rabbitmq
      ports:
        - port: 5672
