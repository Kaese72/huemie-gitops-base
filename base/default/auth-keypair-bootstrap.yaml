apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-keypair-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auth-keypair-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auth-keypair-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
subjects:
  - kind: ServiceAccount
    name: auth-keypair-bootstrap
roleRef:
  kind: Role
  name: auth-keypair-bootstrap
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: auth-keypair-bootstrap
  labels:
    app: auth-keypair-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: auth-keypair-bootstrap
        huemie.space/service-role: auth-keypair-bootstrap
    spec:
      serviceAccountName: auth-keypair-bootstrap
      initContainers:
        - name: generate-keypair
          image: alpine/openssl:3.5.7
          imagePullPolicy: IfNotPresent
          # Generates the authentication service's RSA signing keypair into a
          # shared scratch volume. Always runs; the sibling container decides
          # whether the result actually gets persisted as a Secret.
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              openssl genrsa -out /keys/private.pem 4096
              openssl rsa -in /keys/private.pem -pubout -out /keys/public.pem
          volumeMounts:
            - name: keys
              mountPath: /keys
          resources:
            limits:
              cpu: 250m
              memory: 32M
            requests:
              cpu: 50m
              memory: 16M
      containers:
        - name: create-secrets
          image: alpine/k8s:1.30.2
          imagePullPolicy: IfNotPresent
          # Idempotent: if the auth keypair secrets already exist, does nothing.
          # If the legacy authentication-rsa-secret/auth-rsa-public-key secrets
          # exist (pre-migration deployment), their values are carried forward
          # as a matched pair instead of the freshly generated keypair - we
          # only trust them when BOTH are present, since mixing an old key
          # half with a freshly generated other half would produce a broken
          # (non-matching) keypair.
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              NEW_PRIVATE_SECRET=auth-rsa-signing-key
              NEW_PUBLIC_SECRET=auth-rsa-verify-key
              OLD_PRIVATE_SECRET=authentication-rsa-secret
              OLD_PUBLIC_SECRET=auth-rsa-public-key

              if kubectl get secret "$NEW_PRIVATE_SECRET" -n "$NAMESPACE" >/dev/null 2>&1 && \
                 kubectl get secret "$NEW_PUBLIC_SECRET" -n "$NAMESPACE" >/dev/null 2>&1; then
                echo "auth keypair already provisioned, skipping"
                exit 0
              fi

              PRIVATE_SRC=/keys/private.pem
              PUBLIC_SRC=/keys/public.pem

              if kubectl get secret "$OLD_PRIVATE_SECRET" -n "$NAMESPACE" >/dev/null 2>&1 && \
                 kubectl get secret "$OLD_PUBLIC_SECRET" -n "$NAMESPACE" >/dev/null 2>&1; then
                echo "found legacy auth-rsa secrets, carrying their values forward"
                WORKDIR=$(mktemp -d)
                kubectl get secret "$OLD_PRIVATE_SECRET" -n "$NAMESPACE" -o jsonpath='{.data.private\.pem}' | base64 -d > "$WORKDIR/private.pem"
                kubectl get secret "$OLD_PUBLIC_SECRET" -n "$NAMESPACE" -o jsonpath='{.data.public\.pem}' | base64 -d > "$WORKDIR/public.pem"
                PRIVATE_SRC="$WORKDIR/private.pem"
                PUBLIC_SRC="$WORKDIR/public.pem"
              else
                echo "no legacy secrets found, using freshly generated keypair"
              fi

              kubectl create secret generic "$NEW_PRIVATE_SECRET" -n "$NAMESPACE" --from-file=private.pem="$PRIVATE_SRC"
              kubectl create secret generic "$NEW_PUBLIC_SECRET" -n "$NAMESPACE" --from-file=public.pem="$PUBLIC_SRC"
          volumeMounts:
            - name: keys
              mountPath: /keys
              readOnly: true
          resources:
            limits:
              cpu: 100m
              memory: 32M
            requests:
              cpu: 20m
              memory: 16M
      volumes:
        - name: keys
          emptyDir: {}
      restartPolicy: Never
